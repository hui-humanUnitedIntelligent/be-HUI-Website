<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kontakt – HUI</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --teal: #1ED8C8;
  --coral: #E8876A;
  --orange: #F4793B;
  --bg: #F5F5F7;
  --white: #FFFFFF;
  --text: #141A1A;
  --muted: #7A7A8A;
  --border: rgba(30,216,200,0.25);
}

body{
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  margin:0;
  padding:0;
}

/* --- Container --- */
.contact-wrapper{
  max-width: 900px;
  margin: 80px auto;
  background: var(--white);
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  border: 1px solid var(--border);
}

/* --- Headline --- */
.contact-wrapper h1{
  font-size: 2.4rem;
  margin-bottom: 10px;
  background: linear-gradient(135deg, var(--teal), var(--coral));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.contact-wrapper p{
  color: var(--muted);
  margin-bottom: 30px;
}

/* --- Form --- */
form{
  display: flex;
  flex-direction: column;
  gap: 20px;
}

input, textarea{
  width: 100%;
  padding: 14px;
  border-radius: 10px;
