<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kontakt – HUI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050505;
      color: #f5f5f5;
      line-height: 1.6;
    }

    header {
      padding: 2rem 5vw;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    nav a {
      color: #f5f5f5;
      margin-right: 1.5rem;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #00eaff;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.9rem;
      color: #00eaff;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 5vw 6rem;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    h1 span {
      font-style: italic;
      color: #8b5cf6;
    }

    p {
      color: #d4d4d4;
      margin: 0.6rem 0 2rem;
      font-size: 1.1rem;
    }

    form {
      margin-top: 2rem;
      display: grid;
      gap: 1.4rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    input, textarea {
      width: 100%;
      padding: 1rem 1.2rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s ease;
    }

    input:focus, textarea:focus {
      border-color: #00eaff;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
    }

    button {
      padding: 1rem 1.6rem;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      background: linear-gradient(90deg, #00eaff, #ff00c8);
      color: #050505;
      font-weight: 600;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.85;
    }

    footer {
      margin-top: 5rem;
      padding: 4rem 5vw;
      background: #0a0a0a;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 2rem;
    }

    footer h3 {
      margin-bottom: 0.8rem;
      font-size: 1.1rem;
    }

    footer a {
      color: #d4d4d4;
      text-decoration: none;
      display: block;
      margin: 0.3rem 0;
    }
